<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src * data:">
  <title>PulseKeeper</title>
  <style>
    :root {
      --bg: rgba(11, 20, 40, 0.97);
      --surface: rgba(16, 28, 56, 0.98);
      --accent: #0078d4;
      --accent-light: #60cdff;
      --text: #f3f3f3;
      --text2: #ababab;
      --border: rgba(96, 205, 255, 0.12);
      --font: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); background: transparent; color: var(--text); font-size: 13px; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .popup {
      width: 420px; height: 600px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(40px) saturate(180%);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(96,205,255,0.08);
    }
    .popup-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(96, 205, 255, 0.06);
      flex-shrink: 0;
    }
    .popup-title {
      font-size: 14px; font-weight: 600; color: var(--accent-light);
      display: flex; align-items: center; gap: 8px;
    }
    .pk-logo { width: 18px; height: 18px; }
    .popup-actions { display: flex; gap: 5px; }
    .popup-btn {
      padding: 4px 11px; border-radius: 6px; font-size: 11px; font-family: var(--font);
      cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,0.06);
      color: var(--text2); transition: all 0.15s;
    }
    .popup-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .popup-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .popup-btn.primary:hover { background: #006cbe; }
    .filter-row {
      padding: 7px 12px; border-bottom: 1px solid var(--border);
      display: flex; gap: 4px; overflow-x: auto; flex-shrink: 0;
    }
    .filter-row::-webkit-scrollbar { height: 0; }
    .filter-chip {
      padding: 3px 10px; border-radius: 12px; font-size: 11px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
    .items-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .items-list::-webkit-scrollbar { width: 4px; }
    .items-list::-webkit-scrollbar-thumb { background: rgba(96,205,255,0.15); border-radius: 2px; }
    .item { display: flex; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background 0.12s; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .item:hover { background: rgba(96,205,255,0.04); }
    .item-thumb { width: 52px; height: 38px; border-radius: 5px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); }
    .item-icon { width: 52px; height: 38px; border-radius: 5px; flex-shrink: 0; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .item-body { flex: 1; min-width: 0; }
    .item-title { font-size: 12px; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
    .item-meta { display: flex; gap: 6px; align-items: center; }
    .item-source { font-size: 10px; padding: 1px 6px; border-radius: 8px; color: white; font-weight: 500; }
    .item-date { font-size: 10px; color: var(--text2); }
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 12px; color: var(--text2); }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent-light); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 8px; color: var(--text2); font-size: 12px; text-align: center; }
    .popup-footer { padding: 7px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text2); flex-shrink: 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #107c10; display: inline-block; margin-right: 5px; }
    .status-dot.collecting { background: var(--accent-light); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
<div class="popup">
  <div class="popup-header">
    <div class="popup-title">
      <svg class="pk-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="12" fill="#0b1d3a"/>
        <polyline points="4,34 14,34 18,26 22,42 26,16 30,50 34,34 44,34 48,27 52,41 60,34"
          fill="none" stroke="#60cdff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      PulseKeeper
    </div>
    <div class="popup-actions">
      <button class="popup-btn" onclick="window.pcbAPI.sources.collectAll().then(refresh)" title="Refresh">🔄</button>
      <button class="popup-btn" onclick="window.pcbAPI.ui.openSettings()" title="Settings">⚙️</button>
      <button class="popup-btn primary" onclick="window.pcbAPI.output.openDigest();window.pcbAPI.popup.close()">View All</button>
    </div>
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-chip active" data-type="all" onclick="setFilter('all',this)">All</button>
  </div>
  <div class="items-list" id="itemsList">
    <div class="loading"><div class="spinner"></div><span>Loading…</span></div>
  </div>
  <div class="popup-footer">
    <div><span class="status-dot" id="statusDot"></span><span id="statusText">Ready</span></div>
    <span id="itemCount">0 items</span>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
